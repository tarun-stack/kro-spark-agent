# Test fixtures that exercise the healing agent's two remediation paths.
# Requires the spark-operator to be installed and watching spark-jobs.

apiVersion: sparkoperator.k8s.io/v1beta2
kind: SparkApplication
metadata:
  name: test-failing-job
  namespace: spark-jobs
spec:
  type: Scala
  mode: cluster
  image: spark:3.5.3
  # Wrong mainClass: fails at submission, exercising the "restart"/"code_fix"
  # diagnosis path.
  mainClass: org.example.DoesNotExist
  mainApplicationFile: local:///opt/spark/examples/jars/spark-examples_2.12-3.5.3.jar
  sparkVersion: "3.5.3"
  # Spark Operator's own retry mechanism — this is what actually bounds
  # "how many times and how far apart", independent of the healing agent's
  # restart action (which acts on top of, not instead of, this). Without
  # it, deleting the SparkApplication in the actuator's /restart is
  # terminal: nothing resubmits it afterward.
  restartPolicy:
    type: OnFailure
    onFailureRetries: 3
    onFailureRetryInterval: 180
    onSubmissionFailureRetries: 3
    onSubmissionFailureRetryInterval: 180
  driver:
    cores: 1
    memory: 512m
    serviceAccount: spark-operator-spark
  executor:
    instances: 1
    cores: 1
    memory: 512m
---
apiVersion: sparkoperator.k8s.io/v1beta2
kind: SparkApplication
metadata:
  name: test-oom-job
  namespace: spark-jobs
spec:
  type: Scala
  mode: cluster
  image: spark:3.5.3
  mainClass: org.apache.spark.examples.GroupByTest
  mainApplicationFile: local:///opt/spark/examples/jars/spark-examples_2.12-3.5.3.jar
  # numMappers numKVPairs valSize numReducers — each task builds a
  # numKVPairs * valSize in-memory byte array (~5GB per task) against a
  # deliberately tiny executor heap, so it genuinely OOMs under load rather
  # than failing at startup. Exercises the "scale" remediation path.
  arguments: ["4", "5000", "1000000", "4"]
  sparkVersion: "3.5.3"
  restartPolicy:
    type: OnFailure
    onFailureRetries: 3
    onFailureRetryInterval: 180
    onSubmissionFailureRetries: 3
    onSubmissionFailureRetryInterval: 180
  driver:
    cores: 1
    memory: 512m
    serviceAccount: spark-operator-spark
  executor:
    instances: 1
    cores: 1
    memory: 512m
