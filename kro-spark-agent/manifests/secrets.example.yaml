# Not applied automatically. Copy, fill in real values, and apply before
# manifests/instance.yaml — or create with `kubectl create secret generic`.
# Never commit the filled-in version.

# OPENAI_API_KEY is consumed by the proxy sidecar only (credential-replace
# for api.openai.com) — the healing-agent container never sees the real
# value. SMTP_USER/SMTP_PASSWORD are consumed directly by the healing-agent
# container itself, since SMTP isn't an HTTP(S) protocol the proxy can
# credential-replace. SMTP host/port are set on the SparkHealingAgent
# instance (spec.smtpHost / spec.smtpPort), not here.
#
# Gmail / Google Workspace: SMTP_PASSWORD must be an App Password
# (https://myaccount.google.com/apppasswords, needs 2FA), not the account
# password.
#
# Microsoft 365 / Outlook (smtp.office365.com): many tenants have "SMTP AUTH"
# (basic username+password auth) disabled organization-wide by default as of
# 2023+ — this is a per-mailbox or per-tenant setting in the Exchange admin
# center, not something this code can work around. If your org has it off,
# ask an M365 admin to enable "Authenticated SMTP" for this mailbox, or use
# a personal/Workspace account for the approval flow instead. If your org
# also enforces MFA (typical), you'll additionally need an App Password —
# same mechanism as Gmail's, generated at https://mysignins.microsoft.com/security-info
# (only appears there once Authenticated SMTP + MFA are both on).
#
#   kubectl create secret generic healing-agent-credentials \
#     --from-literal=OPENAI_API_KEY=<your-openai-key> \
#     --from-literal=SMTP_USER=you@yourcompany.com \
#     --from-literal=SMTP_PASSWORD=<app password or mailbox password> \
#     -n kro-spark-agent
apiVersion: v1
kind: Secret
metadata:
  name: healing-agent-credentials
  namespace: kro-spark-agent
type: Opaque
stringData:
  OPENAI_API_KEY: "REPLACE_ME"
  SMTP_USER: "REPLACE_ME@example.com"
  SMTP_PASSWORD: "REPLACE_ME"
---
# Only needed if spec.remediation.enabled is true. GITHUB_TOKEN must be a
# fine-grained PAT (or GitHub App token) scoped to only contents:write +
# pull_requests:write on the Spark job repo(s) named in repoMapJson — no
# workflow scope, no org access. OPENAI_API_KEY drives the code-fix agent
# (a first-party OpenAI tool-calling loop, not the Claude Agent SDK).
#
#   kubectl create secret generic remediation-credentials \
#     --from-literal=OPENAI_API_KEY=<openai-key> \
#     --from-literal=GITHUB_TOKEN=<fine-grained-PAT> \
#     -n kro-spark-agent
apiVersion: v1
kind: Secret
metadata:
  name: remediation-credentials
  namespace: kro-spark-agent
type: Opaque
stringData:
  OPENAI_API_KEY: "REPLACE_ME"
  GITHUB_TOKEN: "REPLACE_ME"
